    // ── Render Table ────────────────────────────────────
    const tbody = document.getElementById('portfolio-tbody');
    const countBadge = document.getElementById('portfolio-count');

    function renderTable() {
      countBadge.textContent = portfolios.length;

      if (portfolios.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="2">
              <div class="empty-state" id="empty-state-msg">
                <div class="empty-icon">🚀</div>
                <p>Portfolio links coming soon — check back shortly!</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = portfolios.map((item, index) => {
        const hostname = (() => {
          try { return new URL(item.url).hostname.replace(/^www\./, ''); }
          catch { return item.url; }
        })();

        const tags = item.techs.map(t =>
          `<span class="tech-tag">${escapeHtml(t)}</span>`
        ).join('');

        return `
          <tr id="portfolio-row-${index + 1}">
            <td>
              <a class="live-link"
                 href="${escapeHtml(item.url)}"
                 target="_blank"
                 rel="noopener noreferrer"
                 id="portfolio-link-${index + 1}"
                 aria-label="Visit ${escapeHtml(hostname)} (opens in new tab)">
                ${escapeHtml(hostname)}
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
              </a>
            </td>
            <td>
              <div class="tech-tags">${tags}</div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    renderTable();

    // ── Theme Toggle ─────────────────────────────────────
    const toggleBtn = document.getElementById('theme-toggle-btn');
    const html = document.documentElement;

    const saved = localStorage.getItem('pi-theme');
    if (saved) {
      html.setAttribute('data-theme', saved);
      toggleBtn.textContent = saved === 'dark' ? '🌙' : '☀️';
    }

    toggleBtn.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      toggleBtn.textContent = next === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('pi-theme', next);
    });
  </script>
